name: Deploy

# TAG-GATED deploy: pushing a semver tag (e.g. v0.1.0) is the ONLY thing that ships
# the site. The tag must pass every CI gate — lint, typecheck, unit tests, build,
# secret-scan — and only then does wrangler deploy the Worker. Branch pushes never
# deploy (that's ci.yml); cutting a tag is a deliberate release.
on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The same gates as CI — a release must be green on all of them before it ships.
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r --if-present check
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Run the repo's pinned wrangler via pnpm (the cloudflare/wrangler-action
      # npm-installs its own wrangler, which chokes on pnpm `workspace:*` deps).
      # wrangler authenticates from CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID.
      - name: Deploy Worker to Cloudflare
        run: pnpm --filter web exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
